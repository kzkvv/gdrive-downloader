name: Build Extension

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: build-extension
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: drive-video-downloader-${{ github.run_number }}
          path: dist/drive-video-downloader
          if-no-files-found: error

      - name: Create release archive
        run: |
          cd dist
          zip -r ../drive-video-downloader.zip drive-video-downloader

      - name: Determine release version
        if: github.event_name == 'push' && github.ref_name == 'master'
        id: release_meta
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > releases.json
          node <<'NODE'
          const fs = require("fs");

          const pages = JSON.parse(fs.readFileSync("releases.json", "utf8"));
          const releases = pages.flat();
          const versionPattern = /^v?1\.(\d+)$/;
          const sha = process.env.GITHUB_SHA;

          const existing = releases.find((release) => {
            return versionPattern.test(release.tag_name || "") && release.target_commitish === sha;
          });

          let version;
          if (existing) {
            version = (existing.tag_name || "").replace(/^v/, "");
          } else {
            let maxMinor = -1;
            for (const release of releases) {
              const match = versionPattern.exec(release.tag_name || "");
              if (!match) {
                continue;
              }
              maxMinor = Math.max(maxMinor, Number.parseInt(match[1], 10));
            }
            version = `1.${maxMinor + 1}`;
          }

          const lines = [
            `version=${version}`,
            `tag=v${version}`,
            `title=Release v${version}`,
            `asset=drive-video-downloader-v${version}.zip`,
          ];
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `${lines.join("\n")}\n`);
          NODE

      - name: Prepare release asset
        if: steps.release_meta.outputs.asset != ''
        run: mv drive-video-downloader.zip "${{ steps.release_meta.outputs.asset }}"

      - name: Publish GitHub release
        if: steps.release_meta.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          tag="${{ steps.release_meta.outputs.tag }}"
          title="${{ steps.release_meta.outputs.title }}"
          asset="${{ steps.release_meta.outputs.asset }}"

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --target "$GITHUB_SHA"
            gh release upload "$tag" "$asset" --clobber
          else
            gh release create "$tag" "$asset" --title "$title" --target "$GITHUB_SHA" --notes "Automated release for $GITHUB_SHA." --latest
          fi
